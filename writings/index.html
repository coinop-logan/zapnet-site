<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writings — Zapnet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; }
    body { background: #08080d; }

    .article-body {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 1.125rem;
      line-height: 1.8;
      color: #d8d7cf;
    }
    .article-body p { margin-bottom: 1.25rem; }
    .article-body strong { color: #f0efe8; font-weight: 600; }
    .article-body em { font-style: italic; }
    .article-body blockquote {
      border-left: 3px solid #f7931a;
      padding-left: 1.25rem;
      margin: 1.5rem 0;
      color: #8a8992;
      font-style: italic;
    }
    .article-body hr {
      border: none;
      border-top: 1px solid #1a1a25;
      margin: 2rem 0;
    }
    .article-body a {
      color: #f7931a;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .article-body a:hover { opacity: 0.8; }
    .article-body h1, .article-body h2, .article-body h3 {
      color: #f0efe8;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }
    .article-body h1 { font-size: 1.5rem; }
    .article-body h2 { font-size: 1.3rem; }
    .article-body h3 { font-size: 1.15rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="elm.js"></script>
  <script>
    Elm.Main.init({ node: document.getElementById('app') });
  </script>
</body>
</html>
