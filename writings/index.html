<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writings — Zapnet</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #08080d;
      --surface: #0f0f16;
      --border: #1a1a25;
      --text: #d8d7cf;
      --text-dim: #8a8992;
      --text-bright: #f0efe8;
      --zap: #f7931a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Header */
    .site-header {
      padding: 2.5rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .site-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--zap);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .site-title:hover { opacity: 0.85; }

    .site-subtitle {
      font-size: 0.9rem;
      color: var(--text-dim);
      font-weight: 400;
    }

    /* Content */
    .content {
      padding-bottom: 4rem;
    }

    /* Article cards (index) */
    .article-card {
      display: block;
      padding: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
    }

    .article-card:hover {
      border-color: rgba(247, 147, 26, 0.3);
      background: var(--surface);
    }

    .article-card-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .article-card-desc {
      font-size: 0.95rem;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }

    .article-card-meta {
      font-size: 0.8rem;
      color: var(--text-dim);
      display: flex;
      gap: 0.5rem;
    }

    .meta-sep { opacity: 0.4; }

    /* Article view */
    .back-link {
      display: inline-block;
      font-size: 0.85rem;
      color: var(--text-dim);
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--zap); }

    .article-title {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 2rem;
      font-weight: 500;
      color: var(--text-bright);
      line-height: 1.25;
      margin-bottom: 0.75rem;
    }

    .article-meta {
      font-size: 0.85rem;
      color: var(--text-dim);
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* Markdown body */
    .article-body {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 1.125rem;
      line-height: 1.8;
      color: var(--text);
    }

    .article-body p {
      margin-bottom: 1.25rem;
    }

    .article-body strong {
      color: var(--text-bright);
      font-weight: 600;
    }

    .article-body em {
      font-style: italic;
    }

    .article-body blockquote {
      border-left: 3px solid var(--zap);
      padding-left: 1.25rem;
      margin: 1.5rem 0;
      color: var(--text-dim);
      font-style: italic;
    }

    .article-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .article-body a {
      color: var(--zap);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .article-body a:hover {
      opacity: 0.8;
    }

    .article-body h1, .article-body h2, .article-body h3 {
      color: var(--text-bright);
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }

    .article-body h1 { font-size: 1.5rem; }
    .article-body h2 { font-size: 1.3rem; }
    .article-body h3 { font-size: 1.15rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="elm.js"></script>
  <script>
    Elm.Main.init({ node: document.getElementById('app') });
  </script>
</body>
</html>
