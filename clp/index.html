<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Connection Line Prototyping</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #08080d; overflow: hidden; }
  </style>
</head>
<body>
  <canvas id="canvas" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');

    // Node positions
    const nodeA = { x: 250, y: 180 };
    const nodeB = { x: 550, y: 420 };

    const duration = 400;
    const nodeColor = '#f7931a';

    let startTime = null;
    let particles = [];
    let phase = 'waiting'; // 'waiting', 'firing', 'settled'
    let waitStart = 0;
    const waitDuration = 1200;

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function easeOutQuad(t) {
      return t * (2 - t);
    }

    let sparkAccum = 0;
    function spawnParticles(x, y) {
      sparkAccum += 4; // same spawn rate as before
      while (sparkAccum >= 1) {
        sparkAccum -= 1;
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 3;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1.0,
          decay: 0.06 + Math.random() * 0.08,
          size: 2,
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.94;
        p.vy *= 0.94;
        p.life -= p.decay;
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    function drawParticles() {
      for (const p of particles) {
        const alpha = p.life;
        ctx.fillStyle = `rgba(255, 240, 180, ${alpha})`;
        ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
      }
    }

    function drawNode(node) {
      // Core
      ctx.beginPath();
      ctx.arc(node.x, node.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = nodeColor;
      ctx.fill();

      // White center
      ctx.beginPath();
      ctx.arc(node.x, node.y, 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.fill();
    }

    function draw(timestamp) {
      if (!startTime) {
        startTime = timestamp;
        phase = 'waiting';
        waitStart = timestamp;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (phase === 'waiting') {
        // Show both nodes, no connection yet
        drawNode(nodeA);
        drawNode(nodeB);

        if (timestamp - waitStart >= waitDuration) {
          phase = 'firing';
          startTime = timestamp;
        }
      } else if (phase === 'firing') {
        const elapsed = timestamp - startTime;
        const rawProgress = Math.min(elapsed / duration, 1.0);
        const progress = rawProgress;

        const headX = lerp(nodeA.x, nodeB.x, progress);
        const headY = lerp(nodeA.y, nodeB.y, progress);

        // -- Burned trail behind the head (blue, matching settled line) --
        ctx.beginPath();
        ctx.moveTo(nodeA.x, nodeA.y);
        ctx.lineTo(headX, headY);
        ctx.strokeStyle = 'rgba(100, 140, 220, 0.4)';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.stroke();

        // -- Hot zone near head (bright flare transitioning from blue trail) --
        const hotLength = 0.1;
        const hotStart = Math.max(0, progress - hotLength);
        const hotX = lerp(nodeA.x, nodeB.x, hotStart);
        const hotY = lerp(nodeA.y, nodeB.y, hotStart);

        const hotGrad = ctx.createLinearGradient(hotX, hotY, headX, headY);
        hotGrad.addColorStop(0, 'rgba(100, 140, 220, 0.0)');
        hotGrad.addColorStop(0.4, 'rgba(180, 200, 255, 0.5)');
        hotGrad.addColorStop(0.7, 'rgba(255, 224, 102, 0.7)');
        hotGrad.addColorStop(1, 'rgba(255, 255, 255, 0.9)');

        ctx.beginPath();
        ctx.moveTo(hotX, hotY);
        ctx.lineTo(headX, headY);
        ctx.strokeStyle = hotGrad;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.stroke();

        // -- Head glow --
        const glowGrad = ctx.createRadialGradient(headX, headY, 0, headX, headY, 14);
        glowGrad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
        glowGrad.addColorStop(0.3, 'rgba(255, 224, 102, 0.5)');
        glowGrad.addColorStop(0.6, 'rgba(247, 147, 26, 0.2)');
        glowGrad.addColorStop(1, 'rgba(247, 147, 26, 0.0)');

        ctx.beginPath();
        ctx.arc(headX, headY, 14, 0, Math.PI * 2);
        ctx.fillStyle = glowGrad;
        ctx.fill();

        // -- Bright core dot --
        ctx.beginPath();
        ctx.arc(headX, headY, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 1.0)';
        ctx.fill();

        // Spawn sparks
        spawnParticles(headX, headY);

        // Draw nodes on top
        drawNode(nodeA);
        drawNode(nodeB);

        if (rawProgress >= 1.0) {
          phase = 'settled';
          waitStart = timestamp;
        }
      } else if (phase === 'settled') {
        // Settled connection line
        ctx.beginPath();
        ctx.moveTo(nodeA.x, nodeA.y);
        ctx.lineTo(nodeB.x, nodeB.y);
        ctx.strokeStyle = 'rgba(100, 140, 220, 0.4)';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.stroke();

        drawNode(nodeA);
        drawNode(nodeB);

        // After a pause, reset
        if (timestamp - waitStart >= 2000 && particles.length === 0) {
          phase = 'waiting';
          waitStart = timestamp;
          startTime = null;
        }
      }

      updateParticles();
      drawParticles();

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
