<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="nodeGlow">
      <stop offset="0%" stop-color="#f7931a" stop-opacity="1"/>
      <stop offset="40%" stop-color="#f7931a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f7931a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="haze">
      <stop offset="0%" stop-color="#f7931a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f7931a" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="lineGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a0f"/>

  <!-- Ambient haze -->
  <circle cx="256" cy="256" r="240" fill="url(#haze)"/>

  <!--
    Node positions — designed as a network with varied topology:
    some hubs with many connections, some chains, some clusters,
    and edges that extend off-canvas to imply a larger network.

    A: 256,220  (central hub)
    B: 176,280  (secondary hub)
    C: 344,256  (secondary hub)
    D: 220,148
    E: 320,160
    F: 128,200
    G: 112,316
    H: 200,368
    I: 308,352
    J: 392,308
    K: 380,176
    L: 160,120
    M: 296,100
    N: 436,240
    O: 256,420

    Off-canvas nodes (edges trail off the icon):
    X1: -20,180
    X2: 60,440
    X3: 460,120
    X4: 520,360
    X5: 300,540
    X6: 100,20
    X7: 440,440
    X8: -10,380
  -->

  <!-- Connection lines -->
  <g filter="url(#lineGlow)" stroke="#f7931a" stroke-opacity="0.4" stroke-width="2.5" stroke-linecap="round" fill="none">
    <!-- Hub A connections (central, many spokes) -->
    <line x1="256" y1="220" x2="176" y2="280"/>
    <line x1="256" y1="220" x2="344" y2="256"/>
    <line x1="256" y1="220" x2="220" y2="148"/>
    <line x1="256" y1="220" x2="320" y2="160"/>
    <line x1="256" y1="220" x2="308" y2="352"/>

    <!-- Hub B connections -->
    <line x1="176" y1="280" x2="128" y2="200"/>
    <line x1="176" y1="280" x2="112" y2="316"/>
    <line x1="176" y1="280" x2="200" y2="368"/>
    <line x1="176" y1="280" x2="220" y2="148"/>

    <!-- Hub C connections -->
    <line x1="344" y1="256" x2="392" y2="308"/>
    <line x1="344" y1="256" x2="380" y2="176"/>
    <line x1="344" y1="256" x2="308" y2="352"/>

    <!-- Chain: D-L and D-E-M (branching path) -->
    <line x1="220" y1="148" x2="160" y2="120"/>
    <line x1="220" y1="148" x2="320" y2="160"/>
    <line x1="320" y1="160" x2="296" y2="100"/>
    <line x1="320" y1="160" x2="380" y2="176"/>

    <!-- Lower cluster: H-I-O -->
    <line x1="200" y1="368" x2="308" y2="352"/>
    <line x1="200" y1="368" x2="256" y2="420"/>
    <line x1="308" y1="352" x2="256" y2="420"/>
    <line x1="308" y1="352" x2="392" y2="308"/>

    <!-- Right side: K-N, J-N -->
    <line x1="380" y1="176" x2="436" y2="240"/>
    <line x1="392" y1="308" x2="436" y2="240"/>

    <!-- Skip connection (long diagonal) -->
    <line x1="112" y1="316" x2="200" y2="368"/>
    <line x1="128" y1="200" x2="160" y2="120"/>

    <!-- Edges trailing OFF canvas -->
    <line x1="128" y1="200" x2="-20" y2="180"/>
    <line x1="112" y1="316" x2="-10" y2="380"/>
    <line x1="112" y1="316" x2="60" y2="440"/>
    <line x1="160" y1="120" x2="100" y2="20"/>
    <line x1="296" y1="100" x2="460" y2="120"/>
    <line x1="296" y1="100" x2="240" y2="28"/>
    <line x1="436" y1="240" x2="520" y2="360"/>
    <line x1="392" y1="308" x2="440" y2="440"/>
    <line x1="256" y1="420" x2="300" y2="540"/>
    <line x1="256" y1="420" x2="140" y2="500"/>
    <line x1="200" y1="368" x2="60" y2="440"/>
    <line x1="436" y1="240" x2="530" y2="200"/>
  </g>

  <!-- Rays / crackle -->
  <g stroke="#f7931a" stroke-opacity="0.3" stroke-width="1" stroke-linecap="round" fill="none" filter="url(#glow)">
    <!-- Hub A -->
    <line x1="256" y1="220" x2="244" y2="200"/>
    <line x1="256" y1="220" x2="270" y2="204"/>
    <line x1="256" y1="220" x2="240" y2="228"/>

    <!-- Hub B -->
    <line x1="176" y1="280" x2="160" y2="268"/>
    <line x1="176" y1="280" x2="168" y2="296"/>
    <line x1="176" y1="280" x2="188" y2="268"/>

    <!-- Hub C -->
    <line x1="344" y1="256" x2="360" y2="244"/>
    <line x1="344" y1="256" x2="352" y2="272"/>

    <!-- D -->
    <line x1="220" y1="148" x2="208" y2="132"/>
    <line x1="220" y1="148" x2="232" y2="136"/>

    <!-- E -->
    <line x1="320" y1="160" x2="332" y2="144"/>
    <line x1="320" y1="160" x2="308" y2="148"/>

    <!-- G -->
    <line x1="112" y1="316" x2="96" y2="308"/>
    <line x1="112" y1="316" x2="100" y2="332"/>

    <!-- I -->
    <line x1="308" y1="352" x2="320" y2="368"/>
    <line x1="308" y1="352" x2="296" y2="364"/>

    <!-- J -->
    <line x1="392" y1="308" x2="408" y2="300"/>
    <line x1="392" y1="308" x2="400" y2="324"/>

    <!-- K -->
    <line x1="380" y1="176" x2="396" y2="168"/>

    <!-- M -->
    <line x1="296" y1="100" x2="308" y2="84"/>
    <line x1="296" y1="100" x2="284" y2="88"/>

    <!-- N -->
    <line x1="436" y1="240" x2="452" y2="228"/>
    <line x1="436" y1="240" x2="448" y2="252"/>

    <!-- O -->
    <line x1="256" y1="420" x2="244" y2="436"/>
    <line x1="256" y1="420" x2="268" y2="436"/>
  </g>

  <!-- Node glows -->
  <g filter="url(#softGlow)">
    <!-- Hubs (larger glow) -->
    <circle cx="256" cy="220" r="18" fill="url(#nodeGlow)"/>
    <circle cx="176" cy="280" r="15" fill="url(#nodeGlow)"/>
    <circle cx="344" cy="256" r="15" fill="url(#nodeGlow)"/>
    <!-- Mid nodes -->
    <circle cx="220" cy="148" r="12" fill="url(#nodeGlow)"/>
    <circle cx="320" cy="160" r="12" fill="url(#nodeGlow)"/>
    <circle cx="128" cy="200" r="10" fill="url(#nodeGlow)"/>
    <circle cx="112" cy="316" r="10" fill="url(#nodeGlow)"/>
    <circle cx="200" cy="368" r="11" fill="url(#nodeGlow)"/>
    <circle cx="308" cy="352" r="12" fill="url(#nodeGlow)"/>
    <circle cx="392" cy="308" r="11" fill="url(#nodeGlow)"/>
    <circle cx="380" cy="176" r="10" fill="url(#nodeGlow)"/>
    <!-- Outer nodes -->
    <circle cx="160" cy="120" r="9" fill="url(#nodeGlow)"/>
    <circle cx="296" cy="100" r="9" fill="url(#nodeGlow)"/>
    <circle cx="436" cy="240" r="10" fill="url(#nodeGlow)"/>
    <circle cx="256" cy="420" r="10" fill="url(#nodeGlow)"/>
  </g>

  <!-- Node cores -->
  <g fill="#f7931a">
    <circle cx="256" cy="220" r="5.5"/>
    <circle cx="176" cy="280" r="5"/>
    <circle cx="344" cy="256" r="5"/>
    <circle cx="220" cy="148" r="4"/>
    <circle cx="320" cy="160" r="4"/>
    <circle cx="128" cy="200" r="3.5"/>
    <circle cx="112" cy="316" r="3.5"/>
    <circle cx="200" cy="368" r="3.5"/>
    <circle cx="308" cy="352" r="4"/>
    <circle cx="392" cy="308" r="3.5"/>
    <circle cx="380" cy="176" r="3.5"/>
    <circle cx="160" cy="120" r="3"/>
    <circle cx="296" cy="100" r="3"/>
    <circle cx="436" cy="240" r="3.5"/>
    <circle cx="256" cy="420" r="3.5"/>
  </g>

  <!-- Hot white centers -->
  <g fill="#fff" opacity="0.9">
    <circle cx="256" cy="220" r="2.2"/>
    <circle cx="176" cy="280" r="2"/>
    <circle cx="344" cy="256" r="2"/>
    <circle cx="220" cy="148" r="1.5"/>
    <circle cx="320" cy="160" r="1.5"/>
    <circle cx="128" cy="200" r="1.2"/>
    <circle cx="112" cy="316" r="1.2"/>
    <circle cx="200" cy="368" r="1.3"/>
    <circle cx="308" cy="352" r="1.5"/>
    <circle cx="392" cy="308" r="1.3"/>
    <circle cx="380" cy="176" r="1.2"/>
    <circle cx="160" cy="120" r="1"/>
    <circle cx="296" cy="100" r="1"/>
    <circle cx="436" cy="240" r="1.2"/>
    <circle cx="256" cy="420" r="1.2"/>
  </g>
</svg>
